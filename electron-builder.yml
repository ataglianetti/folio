appId: com.folio.app
productName: Folio
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - "!node_modules/**/*"
  - node_modules/better-sqlite3/**/*
asarUnpack:
  - node_modules/better-sqlite3/**/*
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - universal
  icon: build/icon.icns
  darkModeSupport: true
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
